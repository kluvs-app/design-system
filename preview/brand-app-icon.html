<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--kluvs-font-sans)}
  .card{box-sizing:border-box;width:700px;padding:24px;display:flex;align-items:center;gap:32px}
  .icon-lg{width:144px;height:144px;border-radius:32px;overflow:hidden;box-shadow:0 18px 36px rgba(184,90,34,0.25)}
  .icon-sm{width:72px;height:72px;border-radius:16px;overflow:hidden;box-shadow:0 8px 16px rgba(184,90,34,0.20)}
  .icon-lg img,.icon-sm img{width:100%;height:100%;display:block}
  .stack{display:flex;align-items:center;gap:18px}
  .meta{font-size:13px;color:#666;line-height:1.5}
  .meta strong{color:#1A1A1A;font-weight:600;display:block;margin-bottom:4px}
  .meta code{font-family:ui-monospace,"SF Mono",monospace;font-size:12px;color:#1A1A1A}
</style></head>
<body><div class="card">
  <div class="stack">
    <div class="icon-lg"><img src="../assets/kluvs-app-icon.png" alt="Kluvs app icon"/></div>
    <div class="icon-sm"><img src="../assets/kluvs-app-icon.png" alt=""/></div>
  </div>
  <div class="meta">
    <strong>App icon · iOS / Android</strong>
    Three outlined honeycomb hexagons on copper gradient. Mark only — no wordmark inside the icon. Background gradient: <code>#D16D30 → #B85A22</code>.
  </div>
</div></body></html>
