<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--kluvs-font-sans);color:#1A1A1A}
  .card{box-sizing:border-box;width:700px;padding:20px 24px}
  .group{margin-bottom:18px}
  .label{font-size:11px;font-weight:600;color:#666;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
  .swatches{display:flex;gap:12px}
  .sw{flex:1;border-radius:10px;height:64px;display:flex;align-items:flex-end;padding:8px 10px;color:#fff;font-size:11px;font-family:ui-monospace,"SF Mono",monospace;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06)}
  .sw.dim{color:#FFFFFFcc}
</style></head>
<body><div class="card">
  <div class="group">
    <div class="label">Primary · copper</div>
    <div class="swatches">
      <div class="sw" style="background:#E8944D;color:#1A1A1A">light · #E8944D</div>
      <div class="sw" style="background:#D16D30">DEFAULT · #D16D30</div>
      <div class="sw" style="background:#B85A22">hover · #B85A22</div>
    </div>
  </div>
  <div class="group">
    <div class="label">Secondary · green (success)</div>
    <div class="swatches">
      <div class="sw" style="background:#48A480">DEFAULT · #48A480</div>
      <div class="sw" style="background:#3A8A6A">hover · #3A8A6A</div>
    </div>
  </div>
  <div class="group">
    <div class="label">Tertiary · teal (info / admin)</div>
    <div class="swatches">
      <div class="sw" style="background:#006781">DEFAULT · #006781</div>
      <div class="sw" style="background:#005568">hover · #005568</div>
    </div>
  </div>
</div></body></html>
