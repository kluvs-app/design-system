<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--kluvs-font-sans);}
.card{width:700px;padding:24px;display:flex;flex-direction:column;gap:16px;}
.row{display:flex;align-items:baseline;gap:24px;}
.spec{font-family:ui-monospace,monospace;font-size:11px;color:#8C8C8C;min-width:130px;}
.sample{color:#1A1A1A;}
</style></head>
<body><div class="card">
  <div class="row"><span class="sample" style="font-weight:700;font-size:32px;line-height:1;">Foundations</span><span class="spec">headline · 32 / 700</span></div>
  <div class="row"><span class="sample" style="font-weight:700;font-size:20px;line-height:1;">Section header</span><span class="spec">section · 20 / 700</span></div>
  <div class="row"><span class="sample" style="font-size:22px;line-height:1;">titleLarge</span><span class="spec">22 / 400</span></div>
  <div class="row"><span class="sample" style="font-weight:500;font-size:16px;line-height:1;">titleMedium</span><span class="spec">16 / 500</span></div>
</div></body></html>
