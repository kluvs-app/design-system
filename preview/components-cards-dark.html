<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--kluvs-font-sans);}
.card{width:700px;padding:24px;background:#140F0D;display:flex;flex-direction:column;gap:14px;}
.tile{padding:16px;border-radius:10px;background:#241C17;color:#F2EDE5;}
.tile.accent{background:#382112;border:1.5px solid #D16E30;}
.tile h4{margin:0 0 6px;font-size:15px;font-weight:700;}
.tile .meta{font-size:12px;color:#8C8073;}
.eyebrow{font-size:10px;font-weight:500;color:#D16E30;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
</style></head>
<body><div class="card">
  <div class="tile">
    <h4>How AI Thinks</h4>
    <div class="meta">Nigel Toon · 2024 · 320 pages</div>
  </div>
  <div class="tile accent">
    <div class="eyebrow">Next discussion</div>
    <h4>Ethics, Risk and Our Future</h4>
    <div class="meta">In person · March 2, 2026 at 5:00 PM</div>
  </div>
</div></body></html>
