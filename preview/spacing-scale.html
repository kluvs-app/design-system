<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--kluvs-font-sans);}
.card{width:700px;padding:28px 24px;display:flex;align-items:flex-end;gap:20px;}
.col{display:flex;flex-direction:column;align-items:center;gap:10px;}
.bar{background:#D16E30;border-radius:4px;width:48px;}
.label{font-size:11px;font-weight:500;color:#1A1A1A;}
.code{font-family:ui-monospace,monospace;font-size:10px;color:#8C8C8C;}
</style></head>
<body><div class="card">
  <div class="col"><div class="bar" style="height:4px"></div><div class="label">xs</div><div class="code">4dp</div></div>
  <div class="col"><div class="bar" style="height:8px"></div><div class="label">sm</div><div class="code">8dp</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="label">md</div><div class="code">12dp</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="label">base</div><div class="code">16dp</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="label">lg</div><div class="code">24dp</div></div>
</div></body></html>
