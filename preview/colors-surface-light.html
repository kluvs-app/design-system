<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--kluvs-font-sans);}
.card{width:700px;padding:20px 24px;}
.label{font-size:11px;font-weight:500;color:#8C8C8C;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.s{height:90px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:10px;font-family:ui-monospace,monospace;color:#1A1A1A;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06);}
.s b{font-family:var(--kluvs-font-sans);font-weight:700;font-size:11px;display:block;margin-bottom:2px;}
</style></head>
<body><div class="card">
  <div class="label">Surface — Light (auth, marketing)</div>
  <div class="scale">
    <div class="s" style="background:#FAFAFC"><b>default</b>#FAFAFC</div>
    <div class="s" style="background:#FFFFFF"><b>card</b>#FFFFFF</div>
    <div class="s" style="background:#F5F5F5"><b>muted</b>#F5F5F5</div>
    <div class="s" style="background:#F2F2F2"><b>chip</b>#F2F2F2</div>
    <div class="s" style="background:#FFF7F7;color:#E53333"><b>error-bg</b>#FFF7F7</div>
  </div>
</div></body></html>
