<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--kluvs-font-sans);color:#1A1A1A}
  .card{box-sizing:border-box;width:700px;padding:24px;display:flex;gap:18px;align-items:flex-end;justify-content:space-between}
  .it{display:flex;flex-direction:column;align-items:center;gap:8px}
  .b{width:84px;height:84px;background:#D16D30;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
  .name{font-size:12px;font-weight:600;color:#1A1A1A}
  .meta{font-size:11px;color:#666;font-family:ui-monospace,monospace}
</style></head>
<body><div class="card">
  <div class="it"><div class="b" style="border-radius:4px"></div><div class="name">sm</div><div class="meta">4 · chips</div></div>
  <div class="it"><div class="b" style="border-radius:8px"></div><div class="name">input</div><div class="meta">8 · 0.5rem</div></div>
  <div class="it"><div class="b" style="border-radius:12px"></div><div class="name">btn / card</div><div class="meta">12 · 0.75rem</div></div>
  <div class="it"><div class="b" style="border-radius:16px"></div><div class="name">lg</div><div class="meta">16</div></div>
  <div class="it"><div class="b" style="border-radius:9999px"></div><div class="name">pill</div><div class="meta">9999 · nav</div></div>
</div></body></html>
