<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--kluvs-font-sans);color:#1A1A1A}
  .card{box-sizing:border-box;width:700px;padding:20px 24px}
  .label{font-size:11px;font-weight:600;color:#666;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
  .sw{height:72px;border-radius:10px;display:flex;align-items:flex-end;padding:8px 10px;color:#fff;font-size:11px;font-family:ui-monospace,monospace;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04)}
  .note{font-size:12px;color:#666;line-height:1.5}
</style></head>
<body><div class="card">
  <div class="label">Web · neutral dark (canonical)</div>
  <div class="row">
    <div class="sw" style="background:#0A0A0A">surface · #0A0A0A</div>
    <div class="sw" style="background:#141414">raised · #141414</div>
    <div class="sw" style="background:#1A1A1A">elevated · #1A1A1A</div>
  </div>
  <div class="label">Mobile · warm dark (Figma source)</div>
  <div class="row">
    <div class="sw" style="background:#140F0D">base · #140F0D</div>
    <div class="sw" style="background:#241C17">card · #241C17</div>
    <div class="sw" style="background:#332B24">card-2 · #332B24</div>
  </div>
  <div class="note">Dividers · <code>#2A2A2A</code> (web) · <code>#332B24</code> (mobile)</div>
</div></body></html>
