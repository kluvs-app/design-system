<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--kluvs-font-sans);}
.card{width:700px;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.state{padding:24px;border-radius:10px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;box-shadow:inset 0 0 0 1px #EDEDED;}
.spin{width:48px;height:48px;border-radius:50%;border:4px solid #D16E30;border-top-color:transparent;animation:s 1.2s linear infinite;}
@keyframes s{to{transform:rotate(360deg)}}
.err{width:56px;height:56px;border-radius:50%;background:#FFEBEB;display:flex;align-items:center;justify-content:center;color:#E53333;font-size:26px;font-weight:700;}
.muted{color:#999;font-size:14px;}
.title{font-size:14px;font-weight:500;color:#1A1A1A;}
.btn{height:40px;padding:0 20px;border-radius:8px;background:#D16E30;color:#fff;font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;}
</style></head>
<body><div class="card">
  <div class="state">
    <div class="spin"></div>
    <div class="muted">Loading…</div>
  </div>
  <div class="state">
    <div class="err">!</div>
    <div class="title">Something went wrong</div>
    <div class="muted">Please try again</div>
    <div class="btn">Try again</div>
  </div>
</div></body></html>
