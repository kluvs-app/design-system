<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--kluvs-font-sans);}
.card{width:700px;padding:24px;display:flex;flex-direction:column;gap:12px;}
.btn{display:flex;align-items:center;height:52px;border-radius:10px;padding:0 18px;gap:14px;font:500 15px/1 var(--kluvs-font-sans);}
.btn img{width:22px;height:22px;}
.dc{background:#5865F2;color:#fff;}
.gg{background:#F2F2F2;color:#1F1F1F;border:1px solid #D1D1D1;}
.ap{background:#0F0F0F;color:#fff;}
</style></head>
<body><div class="card">
  <div class="btn dc"><img src="../assets/provider-discord.svg"><span>Continue with Discord</span></div>
  <div class="btn gg"><img src="../assets/provider-google.svg"><span>Continue with Google</span></div>
  <div class="btn ap"><img src="../assets/provider-apple.svg"><span>Continue with Apple</span></div>
</div></body></html>
