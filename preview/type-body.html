<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#fff;font-family:var(--kluvs-font-sans);}
.card{width:700px;padding:24px;display:flex;flex-direction:column;gap:14px;}
.row{display:flex;align-items:baseline;gap:24px;}
.spec{font-family:ui-monospace,monospace;font-size:11px;color:#8C8C8C;min-width:130px;}
.sample{color:#1A1A1A;}
</style></head>
<body><div class="card">
  <div class="row"><span class="sample" style="font-size:16px;line-height:1.4;">bodyLarge — book club discussions, descriptions</span><span class="spec">16 / 400</span></div>
  <div class="row"><span class="sample" style="font-size:14px;line-height:1.4;">bodyMedium — list rows, metadata, member names</span><span class="spec">14 / 400</span></div>
  <div class="row"><span class="sample" style="font-weight:500;font-size:12px;line-height:1;">labelMedium — input labels, eyebrows</span><span class="spec">12 / 500</span></div>
  <div class="row"><span class="sample" style="font-weight:500;font-size:11px;line-height:1;">labelSmall — bottom-nav captions</span><span class="spec">11 / 500</span></div>
  <div class="row"><span class="sample" style="font-size:9px;line-height:1;color:#666">micro · token captions on foundations page</span><span class="spec">9 / 400</span></div>
</div></body></html>
